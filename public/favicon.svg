<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Estilos para la tipografía y animaciones -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cascadia+Code&amp;display=swap');
      
      .terminal-text {
        font-family: 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        /* Reducido de 10px a 4px para que quepa */
        font-size: 4px;
        font-weight: 700;
        fill: #C5C6C7; /* Texto principal (Gris Plateado Claro) */
      }
      .prompt {
        fill: #1ABC9C; /* Prompt/Cursor (Verde Turquesa) */
      }
      .cursor {
        fill: #1ABC9C;
      }
    </style>
  </defs>

  <!-- Fondo oscuro con esquinas suavemente redondeadas -->
  <rect width="32" height="32" rx="4" fill="#0B0C10" />

  <!-- TEXTO: Tu firma de desarrollador (Redimensionado) -->
  <!-- Centrado y legible en 32x32 con la estética de terminal -->
  <text x="16" y="18" text-anchor="middle" class="terminal-text">
    <tspan class="prompt">&gt;</tspan>BrianE<tspan class="prompt">_</tspan>DEV<tspan class="cursor">_</tspan>
  </text>
</svg>
